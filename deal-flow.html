<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Tracker — Yash Parikh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --surface2: #181816;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #8c8984;
    --text3: #524f4c;
    --accent: #c9b896;
    --accent2: #8a7355;
    --green: #4a7c5e;
    --green-text: #8ecba6;
    --amber: #7a5e2e;
    --amber-text: #d4a84b;
    --purple: #4a3d6b;
    --purple-text: #a899d4;
    --red: #7a3535;
    --red-text: #d48a8a;
  }

  html { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.6; }

  body { min-height: 100vh; }

  /* PAGE */
  .page { max-width: 1100px; margin: 0 auto; padding: 60px 32px 120px; }

  /* HEADER */
  .page-header { margin-bottom: 56px; border-bottom: 0.5px solid var(--border); padding-bottom: 32px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .wordmark { font-family: 'Cormorant', serif; font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; }
  .page-title { font-family: 'Cormorant', serif; font-size: 52px; font-weight: 400; line-height: 1; color: var(--text); letter-spacing: -0.01em; }
  .page-title em { font-style: italic; color: var(--accent); }
  .header-meta { text-align: right; }
  .meta-date { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 6px; }
  .add-btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; padding: 8px 16px; border: 0.5px solid var(--border2); background: transparent; color: var(--accent); cursor: pointer; transition: all 0.15s; }
  .add-btn:hover { background: var(--surface); border-color: var(--accent2); }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 0.5px solid var(--border); margin-bottom: 40px; }
  .stat-block { background: var(--surface); padding: 20px 24px; }
  .stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-family: 'Cormorant', serif; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* FILTERS */
  .filter-row { display: flex; gap: 2px; margin-bottom: 24px; }
  .filter-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border: 0.5px solid transparent; background: transparent; color: var(--text3); cursor: pointer; transition: all 0.12s; }
  .filter-btn:hover { color: var(--text2); }
  .filter-btn.active { border-color: var(--border2); color: var(--accent); background: var(--surface); }

  /* TABLE */
  .table-container { border: 0.5px solid var(--border); }
  .table-head { display: grid; grid-template-columns: 2.2fr 1.4fr 1fr 0.8fr 0.8fr 90px 80px; background: var(--surface); border-bottom: 0.5px solid var(--border2); }
  .th { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 10px 16px; font-weight: 500; }

  .deal-row { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
  .deal-row:last-child { border-bottom: none; }
  .deal-main { display: grid; grid-template-columns: 2.2fr 1.4fr 1fr 0.8fr 0.8fr 90px 80px; align-items: center; cursor: pointer; }
  .deal-main:hover { background: var(--surface); }
  .td { padding: 16px 16px; }

  .company-name { font-family: 'Cormorant', serif; font-size: 17px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .company-url { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.02em; }

  .sector-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .sector-tag { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border: 0.5px solid var(--border2); color: var(--text3); }

  .badge { display: inline-block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; font-weight: 500; }
  .badge-preseed { background: rgba(74,61,107,0.3); color: var(--purple-text); border: 0.5px solid rgba(168,153,212,0.2); }
  .badge-seed { background: rgba(74,124,94,0.2); color: var(--green-text); border: 0.5px solid rgba(142,203,166,0.2); }
  .badge-yc { background: rgba(122,94,46,0.3); color: var(--amber-text); border: 0.5px solid rgba(212,168,75,0.2); }
  .badge-early { background: rgba(122,53,53,0.2); color: var(--red-text); border: 0.5px solid rgba(212,138,138,0.2); }
  .badge-series-a { background: rgba(26,74,94,0.3); color: #89c4d4; border: 0.5px solid rgba(137,196,212,0.2); }
  .raising-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 7px; font-weight: 500; background: rgba(74,124,94,0.15); color: var(--green-text); border: 0.5px solid rgba(142,203,166,0.25); }
  .raising-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green-text); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .amount-text { font-size: 13px; color: var(--text); font-variant-numeric: tabular-nums; }

  .row-date { font-size: 10px; color: var(--text3); }

  .row-actions { display: flex; gap: 6px; padding: 0 12px; }
  .row-btn { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.06em; padding: 4px 8px; border: 0.5px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.12s; }
  .row-btn:hover { color: var(--accent); border-color: var(--accent2); }
  .row-btn.del:hover { color: var(--red-text); border-color: var(--red); }

  /* EXPANDED */
  .deal-detail { overflow: hidden; max-height: 0; transition: max-height 0.35s ease; border-top: 0px solid var(--border); }
  .deal-detail.open { max-height: 1000px; border-top: 0.5px solid var(--border); }
  .detail-inner { padding: 24px 16px 28px; background: var(--surface); display: grid; grid-template-columns: 4.8fr 1.6fr 1.2fr 0.8fr; gap: 32px; }
  .detail-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .detail-body { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .team-item { margin-bottom: 10px; }
  .team-name { font-family: 'Cormorant', serif; font-size: 14px; color: var(--text); }
  .team-role { font-size: 10px; color: var(--accent2); letter-spacing: 0.04em; }
  .team-bg { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .social-btn { display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; padding: 1px 5px; border: 0.5px solid var(--border2); color: var(--text3); text-decoration: none; letter-spacing: 0.04em; transition: all 0.12s; line-height: 16px; }
  .social-btn:hover { color: var(--accent); border-color: var(--accent2); }
  .inv-lead { font-family: 'Cormorant', serif; font-size: 14px; color: var(--accent); margin-bottom: 4px; }
  .inv-others { font-size: 11px; color: var(--text3); line-height: 1.6; }
  .detail-thesis { padding: 20px 16px 24px; background: var(--bg); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; border-top: 0.5px solid var(--border); }
  .thesis-bull { color: var(--green-text) !important; }
  .thesis-bear { color: var(--red-text) !important; }
  .thesis-timing { color: var(--amber-text) !important; }

  .notes-text { font-size: 12px; color: var(--text2); line-height: 1.7; font-style: italic; }
  .thesis-list { list-style: none; padding: 0; margin: 0; }
  .thesis-list li { font-size: 12px; color: var(--text2); line-height: 1.6; padding: 2px 0 2px 12px; position: relative; }
  .thesis-list li::before { content: "–"; position: absolute; left: 0; color: var(--text3); }

  /* EMPTY */
  .empty-state { padding: 48px; text-align: center; color: var(--text3); font-size: 12px; }
  .empty-icon { font-size: 24px; margin-bottom: 12px; opacity: 0.3; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-start; justify-content: center; z-index: 1000; padding: 40px 20px; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 0.5px solid var(--border2); width: 100%; max-width: 680px; padding: 32px; position: relative; }
  .modal-title { font-family: 'Cormorant', serif; font-size: 26px; font-weight: 500; color: var(--text); margin-bottom: 28px; }
  .modal-title span { color: var(--accent); font-style: italic; }
  .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; line-height: 1; }
  .close-btn:hover { color: var(--text); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
  .form-input, .form-select, .form-textarea {
    font-family: 'DM Mono', monospace; font-size: 12px; background: var(--bg); border: 0.5px solid var(--border2); color: var(--text); padding: 9px 12px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent2); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select { appearance: none; cursor: pointer; }
  .form-select option { background: var(--surface); }

  .form-section { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); border-bottom: 0.5px solid var(--border); padding-bottom: 6px; margin-bottom: 4px; grid-column: 1 / -1; margin-top: 8px; }

  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; border-top: 0.5px solid var(--border); padding-top: 20px; }
  .btn-cancel { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; padding: 8px 16px; border: 0.5px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; }
  .btn-cancel:hover { color: var(--text); }
  .btn-save { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; padding: 8px 20px; border: 0.5px solid var(--accent2); background: transparent; color: var(--accent); cursor: pointer; transition: all 0.15s; }
  .btn-save:hover { background: var(--surface2); }

  .export-row { margin-top: 40px; padding-top: 24px; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .thesis-previews { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 0.5px solid var(--border); margin-bottom: 24px; }
  .thesis-preview { background: var(--surface); padding: 24px 28px; cursor: pointer; transition: background 0.12s; }
  .thesis-preview:hover { background: var(--surface2); }
  .thesis-preview-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; }
  .thesis-preview-headline { font-family: 'Cormorant', serif; font-size: 17px; font-weight: 400; color: var(--text); line-height: 1.35; margin-bottom: 16px; }
  .thesis-preview-stats { display: flex; gap: 24px; border-top: 0.5px solid var(--border); padding-top: 14px; }
  .thesis-preview-stat-num { font-family: 'Cormorant', serif; font-size: 22px; color: var(--accent); font-weight: 500; line-height: 1; }
  .thesis-preview-stat-label { font-size: 9px; color: var(--text3); margin-top: 3px; letter-spacing: 0.04em; }
  .thesis-sector-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; }
  .thesis-headline { font-family: 'Cormorant', serif; font-size: 22px; font-weight: 400; color: var(--text); line-height: 1.3; margin-bottom: 16px; }
  .thesis-funnel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; border-top: 0.5px solid var(--border); padding-top: 18px; margin-top: 4px; }
  .thesis-funnel-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .thesis-funnel-value { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .thesis-stats { display: flex; gap: 32px; margin-bottom: 16px; }
  .thesis-stat-num { font-family: 'Cormorant', serif; font-size: 32px; color: var(--accent); font-weight: 500; line-height: 1; }
  .thesis-stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .export-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; padding: 6px 14px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .export-btn:hover { color: var(--accent); border-color: var(--accent2); }

  @media (max-width: 768px) {
    .page { padding: 32px 20px 80px; }
    .page-title { font-size: 36px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .table-head { display: none; }
    .deal-main { grid-template-columns: 1fr auto; }
    .td:nth-child(n+3):not(:last-child) { display: none; }
    .detail-inner { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="page">
  <header class="page-header">
    <div class="header-top">
      <div>
        <div class="wordmark">Yash Parikh</div>
        <h1 class="page-title">Deal <em>Tracker</em></h1>
      </div>
      <div class="header-meta">
        <div class="meta-date" id="update-date"></div>
        <button class="add-btn" onclick="openModal()">+ Add Deal</button>
      </div>
    </div>
  </header>

  <div class="filter-row" id="filter-row"></div>
  <div id="thesis-previews"></div>
  <div id="thesis-block"></div>
  <div class="table-container">
    <div class="table-head">
      <div class="th">Company</div>
      <div class="th">Sector</div>
      <div class="th">Stage</div>
      <div class="th">Raised</div>
      <div class="th">Date</div>
      <div class="th">Raising</div>
      <div class="th"></div>
    </div>
    <div id="deal-list"></div>
  </div>

  <div class="export-row">
    <div class="export-note">Last updated: <span id="footer-date"></span></div>
    <button class="export-btn" onclick="exportHTML()">Export updated file ↓</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Add <span>deal</span></div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Company name *</label>
        <input class="form-input" id="f-name" type="text" placeholder="e.g. Birch Hill Holdings">
      </div>
      <div class="form-group">
        <label class="form-label">Website</label>
        <input class="form-input" id="f-url" type="text" placeholder="e.g. birchhill.io">
      </div>
      <div class="form-group">
        <label class="form-label">Sector</label>
        <input class="form-input" id="f-sector" type="text" placeholder="e.g. Institutional DeFi / RWA">
      </div>
      <div class="form-group">
        <label class="form-label">Sector group(s) — comma separated</label>
        <input class="form-input" id="f-sectorGroup" type="text" placeholder="e.g. RWA, DeFi">
      </div>
      <div class="form-group">
        <label class="form-label">Stage</label>
        <select class="form-select" id="f-stage">
          <option value="Pre-seed">Pre-seed</option>
          <option value="Seed">Seed</option>
          <option value="Series A">Series A</option>
          <option value="Series B">Series B</option>
          <option value="YC W26">YC W26</option>
          <option value="YC S25">YC S25</option>
          <option value="Early-stage">Early-stage</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Amount raised</label>
        <input class="form-input" id="f-raised" type="text" placeholder="e.g. $4M or —">
      </div>
      <div class="form-group">
        <label class="form-label">Raised (number, for stats)</label>
        <input class="form-input" id="f-raisedNum" type="number" placeholder="4 (in millions, 0 if unknown)" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Date sourced</label>
        <input class="form-input" id="f-date" type="text" placeholder="e.g. Mar 2026">
      </div>
      <div class="form-group" style="justify-content:flex-end;padding-top:18px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="f-raising" style="width:14px;height:14px;accent-color:var(--green-text);cursor:pointer;">
          <span class="form-label" style="margin:0;">Currently raising</span>
        </label>
      </div>
      <div class="form-full form-section">Description</div>
      <div class="form-group form-full">
        <label class="form-label">Company description</label>
        <textarea class="form-textarea" id="f-description" placeholder="What does the company do?"></textarea>
      </div>
      <div class="form-full form-section">Team</div>
      <div class="form-group form-full">
        <label class="form-label">Team (one per line: Name | Role | Background | X URL | LinkedIn URL)</label>
        <textarea class="form-textarea" id="f-team" style="min-height:110px" placeholder="Bhavin Vaid | CEO | ex-Goldman Sachs | https://x.com/handle | https://linkedin.com/in/handle&#10;Jack Forlines | CTO | ex-BlackRock | | "></textarea>
      </div>
      <div class="form-full form-section">Investors</div>
      <div class="form-group">
        <label class="form-label">Lead investor(s)</label>
        <input class="form-input" id="f-leads" type="text" placeholder="e.g. a16z CSX">
      </div>
      <div class="form-group">
        <label class="form-label">Other investors</label>
        <input class="form-input" id="f-others" type="text" placeholder="e.g. Coinbase Ventures, USV">
      </div>
      <div class="form-full form-section">Your thesis</div>
      <div class="form-group form-full">
        <label class="form-label">Bull case</label>
        <textarea class="form-textarea" id="f-bullCase" placeholder="Best argument for this company..."></textarea>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Bear case</label>
        <textarea class="form-textarea" id="f-bearCase" placeholder="What could kill it..."></textarea>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Timing</label>
        <textarea class="form-textarea" id="f-timing" placeholder="Why now (or why not yet)..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveDeal()">Save deal</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
let deals = [
  {
    id: 1,
    name: "Birch Hill Holdings",
    url: "birchhill.io",
    sector: "Institutional DeFi / RWA & Tokenization",
    sectorGroup: ["DeFi / RWA"],
    stage: "Pre-seed",
    raised: "$2.5M",
    raisedNum: 2.5,
    date: "Feb 2026",
    raising: true,
    description: "Institutional onchain credit infrastructure firm bridging TradFi risk discipline with DeFi lending markets.\n\n• Vault curation — onchain vault curator setting collateral parameters, risk limits, and LTV ratios; targeting Digital Asset Treasury companies (DATs), DAOs, and protocol treasuries as primary allocators\n• Tokenization — bringing real-world assets onchain across credit and lending markets; pursuing a broker-dealer license to enable compliant RWA issuance; Bhavin brings strong real estate connections as a key sourcing advantage\n• Proprietary Collateral Risk Framework — VaR/CVaR-based methodology (same family used at BlackRock Aladdin) with auditable governance, detailed exposure reporting, and continuous collateral monitoring\n• Partnerships — Morpho, Yearn",
    team: [
      { name: "Bhavin Vaid", role: "CEO", bg: "ex-Goldman Sachs structured credit, Cerberus Capital PE, 10T Holdings", twitter: "https://x.com/bhavinvaid", linkedin: "https://linkedin.com/in/bhavinvaid" },
      { name: "Jack Forlines", role: "CTO", bg: "ex-BlackRock Aladdin risk systems, digital asset infrastructure", twitter: "", linkedin: "" },
      { name: "Connor Flanagan", role: "COO", bg: "ex-BlackRock Aladdin, digital asset infrastructure", twitter: "", linkedin: "" }
    ],
    leadInvestors: ["ParaFi Capital", "Castle Island Ventures"],

// ─── STAGE BADGE MAP ─────────────────────────────────────────────────────────
function stageBadgeClass(stage) {
  const s = (stage || "").toLowerCase();
  if (s.includes("pre")) return "badge-preseed";
  if (s === "seed") return "badge-seed";
  if (s.includes("yc")) return "badge-yc";
  if (s.includes("series a")) return "badge-series-a";
  return "badge-early";
}

// ─── DATE ─────────────────────────────────────────────────────────────────────
function setDates() {
  const d = new Date();
  const str = d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  document.getElementById("update-date").textContent = "Updated " + str;
  document.getElementById("footer-date").textContent = str;
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function renderFilters() {
  const groups = ["All", "Trading / Prediction Markets", ...[...new Set(deals.flatMap(d => d.sectorGroup))].filter(g => g !== "Trading / Prediction Markets"), "AI"];
  document.getElementById("filter-row").innerHTML = groups.map(g =>
    `<button class="filter-btn ${g === activeFilter ? "active" : ""}" onclick="setFilter('${g}')">${g}</button>`
  ).join("");
}

function setFilter(g) {
  activeFilter = g;
  renderFilters();
  renderPreviews(g);
  renderThesis(g);
  renderDeals();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function toBullets(text) {
  if (!text) return "<li>—</li>";
  const items = text.split(/\n|(?<=\.)\s+(?=[A-Z])/).map(s => s.trim()).filter(Boolean);
  return items.map(s => `<li>${s.endsWith(".") ? s.slice(0,-1) : s}</li>`).join("");
}

// ─── DEALS ────────────────────────────────────────────────────────────────────

  const filtered = activeFilter === "All" ? deals : deals.filter(d => d.sectorGroup.includes(activeFilter));

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">◌</div>No deals match this filter.</div>`;

  }

    <div class="deal-row" id="deal-${d.id}">
      <div class="deal-main" onclick="toggleDeal(${d.id})">
        <div class="td">
          <div class="company-name">${d.name}</div>
          <div class="company-url">${d.url || ""}</div>
        </div>
        <div class="td"><div class="sector-tags">${(d.sectorGroup || []).map(t => `<span class="sector-tag">${t}</span>`).join("")}</div></div>

        <div class="td"><span class="amount-text">${d.raised}</span></div>

        </div>
      </div>
      <div class="deal-detail ${openDeal === d.id ? "open" : ""}">
        <div class="detail-inner">

            <div class="detail-body">${(d.description || "—").replace(/\n/g, "<br>")}</div>
          </div>
          <div>
            <div class="detail-label">Team</div>

              <div class="team-item">

                  <div class="team-name">${t.name}</div>
                  ${t.twitter ? `<a href="${t.twitter}" target="_blank" class="social-btn">𝕏</a>` : ""}
                  ${t.linkedin ? `<a href="${t.linkedin}" target="_blank" class="social-btn">in</a>` : ""}
                </div>
                <div class="team-role">${t.role}</div>

          <div>

        </div>

function toggleDeal(id) {
  openDeal = openDeal === id ? null : id;
  renderDeals();
}

function deleteDeal(id) {
  if (!confirm("Remove this deal?")) return;
  deals = deals.filter(d => d.id !== id);
  if (openDeal === id) openDeal = null;
  renderFilters();
  renderDeals();
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(deal) {
  editingId = deal ? deal.id : null;
  document.getElementById("modal-title").innerHTML = deal ? 'Edit <span>deal</span>' : 'Add <span>deal</span>';

  document.getElementById("f-name").value = deal ? deal.name : "";
  document.getElementById("f-url").value = deal ? deal.url : "";
  document.getElementById("f-sector").value = deal ? deal.sector : "";
  document.getElementById("f-sectorGroup").value = deal ? (deal.sectorGroup || []).join(", ") : "";
  document.getElementById("f-stage").value = deal ? deal.stage : "Pre-seed";
  document.getElementById("f-raised").value = deal ? deal.raised : "";
  document.getElementById("f-raisedNum").value = deal ? deal.raisedNum : 0;
  document.getElementById("f-date").value = deal ? deal.date : "";
  document.getElementById("f-raising").checked = deal ? !!deal.raising : false;
  document.getElementById("f-description").value = deal ? deal.description : "";
  document.getElementById("f-team").value = deal ? (deal.team || []).map(t => `${t.name} | ${t.role} | ${t.bg} | ${t.twitter || ""} | ${t.linkedin || ""}`).join("\n") : "";
  document.getElementById("f-leads").value = deal ? (deal.leadInvestors || []).join(", ") : "";
  document.getElementById("f-others").value = deal ? deal.otherInvestors : "";
  document.getElementById("f-bullCase").value = deal ? deal.bullCase : "";
  document.getElementById("f-bearCase").value = deal ? deal.bearCase : "";
  document.getElementById("f-timing").value = deal ? deal.timing : "";

  document.getElementById("modal-overlay").classList.add("open");
  document.getElementById("f-name").focus();
}

function editDeal(id) {
  const deal = deals.find(d => d.id === id);
  if (deal) openModal(deal);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

function saveDeal() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("Company name is required."); return; }

  const teamRaw = document.getElementById("f-team").value.trim();
  const team = teamRaw ? teamRaw.split("\n").filter(Boolean).map(line => {
    const parts = line.split("|").map(p => p.trim());
    return { name: parts[0] || "", role: parts[1] || "", bg: parts[2] || "", twitter: parts[3] || "", linkedin: parts[4] || "" };
  }) : [];

  const leadsRaw = document.getElementById("f-leads").value.trim();
  const leads = leadsRaw ? leadsRaw.split(",").map(s => s.trim()).filter(Boolean) : [];

  const dealData = {
    name,
    url: document.getElementById("f-url").value.trim(),
    sector: document.getElementById("f-sector").value.trim(),
    sectorGroup: document.getElementById("f-sectorGroup").value.split(",").map(s => s.trim()).filter(Boolean),
    stage: document.getElementById("f-stage").value,
    raised: document.getElementById("f-raised").value.trim() || "—",
    raisedNum: parseFloat(document.getElementById("f-raisedNum").value) || 0,
    date: document.getElementById("f-date").value.trim(),
    raising: document.getElementById("f-raising").checked,
    description: document.getElementById("f-description").value.trim(),
    team,
    leadInvestors: leads,
    otherInvestors: document.getElementById("f-others").value.trim(),
    bullCase: document.getElementById("f-bullCase").value.trim(),
    bearCase: document.getElementById("f-bearCase").value.trim(),
    timing: document.getElementById("f-timing").value.trim()
  };

  if (editingId !== null) {
    const idx = deals.findIndex(d => d.id === editingId);
    if (idx !== -1) deals[idx] = { ...dealData, id: editingId };
  } else {
    deals.push({ ...dealData, id: nextId++ });
  }

  closeModal();
  renderFilters();
  renderDeals();
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportHTML() {
  const dataStr = JSON.stringify(deals, null, 2);
  const nextIdStr = String(nextId);
  const thesisStr = JSON.stringify(theses, null, 2);
  const source = document.documentElement.outerHTML;

  const updated = source
    .replace(/let deals = \[[\s\S]*?\];/, "let deals = " + dataStr + ";")
    .replace(/let nextId = \d+;/, "let nextId = " + nextIdStr + ";")
    .replace(/const theses = \{[\s\S]*?\};/, "const theses = " + thesisStr + ";");

  const blob = new Blob([updated], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "deal-flow.html";
  a.click();
  URL.revokeObjectURL(a.href);
}
